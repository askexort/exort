version: "3.9"

services:
  # Exort CLI (interactive)
  Exort:
    build: .
    stdin_open: true
    tty: true
    env_file: .env
    volumes:
      - Exort-data:/root/.Exort
    profiles:
      - cli

  # Telegram Bot
  bot:
    build: .
    entrypoint: ["python", "bot/telegram_bot.py"]
    env_file: .env
    restart: unless-stopped
    volumes:
      - Exort-data:/root/.Exort
    profiles:
      - bot

  # Landing Page (nginx)
  landing:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./landing:/usr/share/nginx/html:ro
    profiles:
      - web

volumes:
  Exort-data:
