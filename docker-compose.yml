version: "3.8"

services:
  # Interactive CLI
  cli:
    build: .
    stdin_open: true
    tty: true
    volumes:
      - exort-data:/root/.exort
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}

  # Telegram bot
  bot:
    build: .
    command: serve
    restart: unless-stopped
    volumes:
      - exort-data:/root/.exort
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GROQ_API_KEY=${GROQ_API_KEY}

volumes:
  exort-data:
