# Exort Telegram Bot — Fly.io deployment
# Free tier: 3 shared-cpu-1x VMs (256MB), always on

app = "exort-bot"
primary_region = "iad"

[build]

# Restart policy — always keep the bot running
[restart]
  policy = "always"

# VM sizing — 256MB is enough for the bot
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
