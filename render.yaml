services:
  - type: web
    name: exort-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DEFAULT_MODEL
        value: "gemini-2.0-flash"
      - key: PORT
        value: "8080"
