services:
  - type: web
    name: exort-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: DEFAULT_MODEL
        value: "llama-3.3-70b-versatile"
      - key: PORT
        value: "8080"
