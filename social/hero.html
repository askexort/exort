<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 675px; background: #000; overflow: hidden; font-family: 'Inter', -apple-system, sans-serif; position: relative; }
.grid {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
              linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  transform: perspective(600px) rotateX(55deg);
  transform-origin: center 70%;
}
.glow1 { position: absolute; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%); top: -100px; right: -100px; }
.glow2 { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(168,85,247,0.08) 0%, transparent 70%); bottom: -50px; left: -50px; }
.content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
.badge { background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.3); border-radius: 100px; padding: 8px 24px; color: #818cf8; font-size: 14px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px; }
h1 { font-size: 80px; font-weight: 900; line-height: 1; letter-spacing: -3px; background: linear-gradient(135deg, #818cf8, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
.sub { font-size: 22px; color: #64748b; font-weight: 400; letter-spacing: 1px; }
.logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
.logo-text { font-size: 36px; font-weight: 800; background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
</style></head><body>
<div class="grid"></div>
<div class="glow1"></div>
<div class="glow2"></div>
<div class="content">
  <div class="badge">Open Source AI Framework</div>
  <div class="logo-row">
    <span class="logo-text">EXORT</span>
  </div>
  <h1>FREE AI FOR<br>EVERYONE</h1>
  <div class="sub">Build autonomous AI agents that reason, act, and learn</div>
</div>
</body></html>
