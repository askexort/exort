<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 675px; background: #000; overflow: hidden; font-family: 'Inter', -apple-system, sans-serif; position: relative; }
.glow { position: absolute; width: 700px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(168,85,247,0.08) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%,-50%); }
.content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
.logo { font-size: 48px; font-weight: 900; background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; letter-spacing: 3px; }
.sub { font-size: 18px; color: #64748b; margin-bottom: 40px; }
.install-box { background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.2); border-radius: 12px; padding: 16px 40px; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 20px; color: #818cf8; margin-bottom: 30px; }
.install-box span { color: #64748b; }
.btn { background: linear-gradient(135deg, #6366f1, #a855f7); border: none; border-radius: 12px; padding: 16px 48px; font-size: 18px; font-weight: 700; color: white; cursor: pointer; margin-bottom: 24px; letter-spacing: 1px; }
.links { display: flex; gap: 40px; }
.link { display: flex; align-items: center; gap: 10px; color: #64748b; font-size: 15px; }
.link-icon { font-size: 20px; }
.link span { color: #e2e8f0; font-weight: 600; }
</style></head><body>
<div class="glow"></div>
<div class="content">
  <div class="logo">EXORT</div>
  <div class="sub">The Open Agent Engine</div>
  <div class="install-box"><span>$ </span>pip install exort-agent</div>
  <div class="btn">⭐ Star on GitHub</div>
  <div class="links">
    <div class="link"><span class="link-icon">🌐</span> <span>askexort.com</span></div>
    <div class="link"><span class="link-icon">🤖</span> <span>@askexort_bot</span></div>
    <div class="link"><span class="link-icon">📦</span> <span>github.com/askexort/exort</span></div>
  </div>
</div>
</body></html>
