<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brewing — Exort</title>
  <link rel="icon" href="favicon.jpg" type="image/jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#000;color:#fff;height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column}

    .header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(0,0,0,0.8);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.15rem;color:#fff;text-decoration:none}
    .logo img{width:32px;height:32px;border-radius:8px}
    .nav-links{display:flex;gap:28px;align-items:center}
    .nav-links a{color:#94a3b8;font-size:0.875rem;font-weight:500;text-decoration:none;transition:color .2s}
    .nav-links a:hover{color:#fff}
    .nav-links a.active{color:#fff}
    .btn-start{background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;padding:8px 20px;border-radius:10px;font-size:0.85rem;font-weight:600;text-decoration:none;transition:all .2s}
    .btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(99,102,241,0.3)}

    .content{text-align:center}
    .content h1{font-size:clamp(2.5rem,7vw,5rem);font-weight:900;letter-spacing:-0.03em;background:linear-gradient(135deg,#6366f1,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;margin-bottom:16px}
    .content .sub{font-size:clamp(1rem,2.5vw,1.5rem);font-weight:600;color:#94a3b8;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:32px}
    .content .tag{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:100px;padding:14px 32px;font-size:1rem;font-weight:600;color:#fff;animation:pulse 2s ease-in-out infinite}
    .content .tag i{color:#6366f1;font-size:1.2rem}

    @keyframes pulse{
      0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,0.3)}
      50%{box-shadow:0 0 0 12px rgba(99,102,241,0)}
    }

    @media(max-width:768px){.header{padding:0 20px}.nav-links{display:none}}
  </style>
</head>
<body>
  <header class="header">
    <a href="index.html" class="logo">
      <img src="openmindlogo.jpg" alt="Exort">
      <span>Exort</span>
    </a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="index.html#features">Features</a>
      <a href="index.html#tutorials">Tutorials</a>
      <a href="index.html#faq">FAQ</a>
      <a href="brewing.html" class="active">Brewing</a>
      <a href="https://t.me/askexort_bot" target="_blank" class="btn-start">Get Started</a>
    </nav>
  </header>

  <div class="content">
    <h1>Something is Coming</h1>
    <p class="sub">On Base</p>
    <div class="tag">
      <i class="fas fa-rocket"></i>
      <span>Stay Tuned</span>
    </div>
  </div>
</body>
</html>
