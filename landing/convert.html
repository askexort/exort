
<!DOCTYPE html>
<html>
<head>
    <title>Logo Converter</title>
</head>
<body>
    <canvas id="canvas" width="400" height="400"></canvas>
    <script>
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
            <defs>
                <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
                </linearGradient>
                <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
                </linearGradient>
            </defs>
            <circle cx="256" cy="256" r="240" fill="#0f172a" stroke="url(#grad1)" stroke-width="8"/>
            <circle cx="256" cy="120" r="24" fill="url(#grad1)"/>
            <circle cx="156" cy="200" r="20" fill="url(#grad1)" opacity="0.9"/>
            <circle cx="356" cy="200" r="20" fill="url(#grad1)" opacity="0.9"/>
            <circle cx="120" cy="320" r="18" fill="url(#grad2)" opacity="0.8"/>
            <circle cx="256" cy="280" r="22" fill="url(#grad2)"/>
            <circle cx="392" cy="320" r="18" fill="url(#grad2)" opacity="0.8"/>
            <circle cx="200" cy="400" r="16" fill="url(#grad1)" opacity="0.7"/>
            <circle cx="312" cy="400" r="16" fill="url(#grad1)" opacity="0.7"/>
            <line x1="256" y1="144" x2="176" y2="185" stroke="url(#grad1)" stroke-width="3" opacity="0.6"/>
            <line x1="256" y1="144" x2="336" y2="185" stroke="url(#grad1)" stroke-width="3" opacity="0.6"/>
            <line x1="176" y1="220" x2="138" y2="305" stroke="url(#grad1)" stroke-width="2.5" opacity="0.5"/>
            <line x1="176" y1="220" x2="256" y2="260" stroke="url(#grad1)" stroke-width="2.5" opacity="0.5"/>
            <line x1="336" y1="220" x2="372" y2="305" stroke="url(#grad1)" stroke-width="2.5" opacity="0.5"/>
            <line x1="336" y1="220" x2="256" y2="260" stroke="url(#grad1)" stroke-width="2.5" opacity="0.5"/>
            <line x1="138" y1="338" x2="200" y2="385" stroke="url(#grad2)" stroke-width="2" opacity="0.4"/>
            <line x1="256" y1="302" x2="200" y2="385" stroke="url(#grad2)" stroke-width="2" opacity="0.4"/>
            <line x1="256" y1="302" x2="312" y2="385" stroke="url(#grad2)" stroke-width="2" opacity="0.4"/>
            <line x1="372" y1="338" x2="312" y2="385" stroke="url(#grad2)" stroke-width="2" opacity="0.4"/>
            <text x="256" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="180" fill="white" opacity="0.15">E</text>
            <circle cx="256" cy="280" r="30" fill="url(#grad2)" opacity="0.3">
                <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3s" repeatCount="indefinite"/>
            </circle>
        </svg>`;
        
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        const blob = new Blob([svg], {type: 'image/svg+xml'});
        const url = URL.createObjectURL(blob);
        
        img.onload = function() {
            ctx.drawImage(img, 0, 0, 400, 400);
            URL.revokeObjectURL(url);
            
            // Convert to PNG
            const pngUrl = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = 'exort-logo.png';
            link.href = pngUrl;
            link.click();
        };
        img.src = url;
    </script>
</body>
</html>
